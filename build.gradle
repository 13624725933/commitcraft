buildscript {
    repositories {
        mavenCentral()
        maven {
            url 'https://plugins.gradle.org/m2/'
        }
    }
    dependencies {
        classpath 'org.jetbrains.intellij:org.jetbrains.intellij.gradle.plugin:1.17.4'
    }
}

plugins {
    id 'java'
}

apply plugin: 'org.jetbrains.intellij'

group = 'com.local.commitcraft'
version = '0.2.3'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.google.code.gson:gson:2.11.0'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

intellij {
    version = '2024.2.5'
    type = 'IC'
    updateSinceUntilBuild = false
}

patchPluginXml {
    version = project.version
    sinceBuild = '242'
    untilBuild = ''
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 17
}
